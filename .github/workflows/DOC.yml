name: DOC

on:
  push:
    branches: [ main ]

concurrency:
  group: "pages"
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    name: "Build documentation"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Set up pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0
      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          version: "0.11.3"
          enable-cache: true
          python-version: "3.13"
      - name: Update package index
        run: |
          # Change mirror priorities because Azure can be really slow - https://github.com/actions/runner-images/issues/7048.
          sudo sed -i '/archive.ubuntu.com\/ubuntu\/\tpriority/ s/priority:2/priority:0/' /etc/apt/apt-mirrors.txt
          sudo sed -i '/azure.archive.ubuntu.com\/ubuntu\/\tpriority/ s/priority:0/priority:1/' /etc/apt/apt-mirrors.txt
          sudo sed -i '/security.ubuntu.com\/ubuntu\/\tpriority/ s/priority:3/priority:2/' /etc/apt/apt-mirrors.txt
          sudo apt-get update
      - name: Set up GCC and pandoc
        run: |
          sudo apt-get install -y gcc-13 g++-13 pandoc

          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-13 10
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-13 10

          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV
      - name: Build PyVRP
        run: uv sync --group docs --group examples
      - name: Build documentation
        run: uv run make html --directory=docs
      - name: Upload documentation
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: 'docs/build/html'

  deploy:
    name: "Deploy documentation"
    needs: [ build ]
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy documentation
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
